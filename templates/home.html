<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SARMS - University Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold fs-4">🎓 SARMS University Portal</span>
    </nav>

    <div class="container text-center mt-5">
        <h2 class="mb-2">Welcome to SARMS</h2>
        <p class="text-muted mb-5">Student Attendance & Result Management System</p>

        <div class="row justify-content-center g-4">

            <div class="col-md-3">
                <div class="card shadow h-100">
                    <div class="card-body py-4">
                        <div class="fs-1 mb-3">🎒</div>
                        <h5 class="card-title">Student</h5>
                        <p class="card-text text-muted small">View attendance, marks and subjects</p>
                        <a href="/login/student" class="btn btn-primary w-100 mt-2">Student Login</a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow h-100">
                    <div class="card-body py-4">
                        <div class="fs-1 mb-3">👨‍🏫</div>
                        <h5 class="card-title">Teacher</h5>
                        <p class="card-text text-muted small">Mark attendance and enter marks</p>
                        <a href="/login/teacher" class="btn btn-success w-100 mt-2">Teacher Login</a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow h-100">
                    <div class="card-body py-4">
                        <div class="fs-1 mb-3">🛠️</div>
                        <h5 class="card-title">Admin</h5>
                        <p class="card-text text-muted small">Manage students, teachers and subjects</p>
                        <a href="/login/admin" class="btn btn-danger w-100 mt-2">Admin Login</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
